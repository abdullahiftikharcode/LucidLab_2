<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Submit Experiment</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <!-- Firebase SDK (compat for plain JS) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    :root { --primary: #00f2ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: transparent;
      font-family: Inter, system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    /* Full-screen dim overlay — fills the entire WebView */
    .overlay {
      position: fixed; inset: 0; z-index: 10;
      background: rgba(0, 0, 0, 0.70);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      animation: fadeIn 0.18s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* The card */
    .modal-box {
      width: 100%; max-width: 340px;
      background: rgba(15, 34, 35, 0.97);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 20px;
      padding: 28px;
      box-shadow:
        0 0 0 1px rgba(0, 242, 255, 0.06) inset,
        0 0 48px rgba(0, 242, 255, 0.12),
        0 24px 48px rgba(0, 0, 0, 0.55);
      position: relative; overflow: hidden;
      animation: slideUp 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes slideUp {
      from { transform: translateY(24px) scale(0.96); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    /* Decorative glow orb */
    .modal-glow {
      position: absolute; top: -80px; right: -80px;
      width: 200px; height: 200px;
      background: rgba(0, 242, 255, 0.10);
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
    }
    .modal-glow-bottom {
      position: absolute; bottom: -80px; left: -60px;
      width: 160px; height: 160px;
      background: rgba(0, 120, 170, 0.08);
      border-radius: 50%;
      filter: blur(50px);
      pointer-events: none;
    }

    .modal-icon-wrap {
      width: 52px; height: 52px;
      background: rgba(0, 242, 255, 0.12);
      border: 1px solid rgba(0, 242, 255, 0.3);
      border-radius: 14px;
      display: grid; place-items: center;
      margin-bottom: 16px;
    }
    .modal-icon-wrap .material-symbols-outlined { font-size: 28px; color: var(--primary); }

    .modal-title {
      font-size: 20px; font-weight: 700;
      color: #f1f5f9; letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .modal-desc {
      font-size: 13px; color: #7f9398;
      line-height: 1.6; margin-bottom: 22px;
    }

    /* Details summary card */
    .modal-details {
      background: rgba(0, 242, 255, 0.05);
      border: 1px solid rgba(0, 242, 255, 0.12);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 22px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .detail-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px;
    }
    .detail-row .d-label {
      color: #7f9398; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .detail-row .d-value {
      color: var(--primary); font-weight: 700; font-size: 13px;
    }

    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn-confirm {
      width: 100%; padding: 15px;
      background: var(--primary); border: none; border-radius: 12px;
      color: #072024; font-family: Inter, sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 0 24px rgba(0, 242, 255, 0.35);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-confirm:active { opacity: 0.88; transform: scale(0.98); }
    .btn-confirm .material-symbols-outlined { font-size: 20px; }

    .btn-cancel {
      width: 100%; padding: 13px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #94a3b8; font-family: Inter, sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:active { background: rgba(255, 255, 255, 0.06); }

    /* Success State Styles */
    #success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes zoomIn {
      from { transform: scale(0.8); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .success-icon-container {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 24px;
    }

    .success-glow-ring {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
      animation: pulseGlow 2s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }

    .checkmark-svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 12px rgba(0, 242, 255, 0.5));
    }

    .checkmark-circle {
      stroke: var(--primary);
      stroke-width: 2;
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-linecap: round;
      fill: rgba(0, 242, 255, 0.05);
      animation: strokeCircle 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-check {
      transform-origin: 50% 50%;
      stroke: var(--primary);
      stroke-width: 4;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke-linecap: round;
      animation: strokeCheck 0.3s 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    @keyframes strokeCircle { 100% { stroke-dashoffset: 0; } }
    @keyframes strokeCheck { 100% { stroke-dashoffset: 0; } }

    .success-title {
      font-size: 24px; font-weight: 800;
      color: #fff; letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .success-subtitle {
      font-size: 14px; color: #7f9398;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="modal-box" id="modal">
      <div class="modal-glow"></div>
      <div class="modal-glow-bottom"></div>

      <!-- Initial State (Confirmation) -->
      <div id="confirm-state">
        <div class="modal-icon-wrap">
          <span class="material-symbols-outlined">assignment_turned_in</span>
        </div>

        <div class="modal-title">Submit Experiment</div>
        <p class="modal-desc">
          This will submit your current session to your instructor for grading.
          Make sure you have completed all required steps.
        </p>

        <div class="modal-details">
          <div class="detail-row">
            <span class="d-label">Status</span>
            <span class="d-value" id="modal-status-val">In Progress</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Progress</span>
            <span class="d-value" id="modal-progress-val">—</span>
          </div>
          <div class="detail-row">
            <span class="d-label">Submission</span>
            <span class="d-value">Final</span>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn-confirm" id="btn-confirm" onclick="confirmSubmit()">
            <span class="material-symbols-outlined">send</span>
            Submit Now
          </button>
          <button class="btn-cancel" onclick="cancelSubmit()">Cancel</button>
        </div>
      </div>

      <!-- Success State -->
      <div id="success-state">
        <div class="success-icon-container">
          <div class="success-glow-ring"></div>
          <svg class="checkmark-svg" viewBox="0 0 52 52">
            <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
            <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
          </svg>
        </div>
        <div class="success-title">Success!</div>
        <div class="success-subtitle">Your experiment has been submitted.</div>
      </div>

    </div>
  </div>

  <script>
    /* ==========================================================
       Firebase Init
       ========================================================== */
    firebase.initializeApp({
      apiKey: "AIzaSyCbHACZX4VhFCj45hOr_TlK5KT5yi2dGSs",
      authDomain: "campuspulse0.firebaseapp.com",
      projectId: "campuspulse0",
      storageBucket: "campuspulse0.firebasestorage.app",
      messagingSenderId: "91092596944",
      appId: "1:91092596944:web:4c78dae4fb11db961486d5"
    });
    var db = firebase.firestore();
    var submissionData = null; // To be populated via message context

    function sendToUnity(msg) {
      if (window.Unity && window.Unity.call) {
        window.Unity.call(msg);
      } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.unityControl) {
        window.webkit.messageHandlers.unityControl.postMessage(msg);
      } else {
        window.location = "unity:" + msg;
      }
    }

    function confirmSubmit() {
      if (!submissionData) {
        console.error("No submission data available");
        return;
      }

      // Disable the button to prevent double-tap
      var btn = document.getElementById("btn-confirm");
      btn.disabled = true;
      btn.style.opacity = "0.6";

      // Perform Firestore write
      db.collection("submissions").add({
        studentId: submissionData.studentId || "unknown",
        experimentId: submissionData.experimentId || "unknown",
        classroomId: submissionData.classroomId || "unknown",
        expname: submissionData.expname || "Untitled",
        status: "submitted",
        grade: null,
        stateJson: submissionData.stateJson || "{}",
        submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(function(docRef) {
        console.log("Submission successful ID:", docRef.id);
        
        // Create notification for the instructor
        if (submissionData.instructorId) {
          db.collection("notifications").add({
            userId: submissionData.instructorId,
            type: "submission_received",
            title: "New Submission Received",
            message: (submissionData.studentName || "A student") + " submitted " + (submissionData.expname || "an experiment"),
            link: "/evaluation/" + submissionData.classroomId + "/" + submissionData.experimentId,
            isRead: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            data: {
              classroomId: submissionData.classroomId,
              experimentId: submissionData.experimentId,
              submissionId: docRef.id,
              studentId: submissionData.studentId
            }
          }).catch(function(e) { console.error("Notif failed:", e); });
        }

        // Transition to success state
        document.getElementById("confirm-state").style.display = "none";
        document.getElementById("success-state").style.display = "flex";
        
        // Wait for animation to play before notifying Unity
        setTimeout(function() {
          sendToUnity("submission_success");
        }, 2500);
      })
      .catch(function(error) {
        console.error("Submission failed:", error);
        btn.disabled = false;
        btn.style.opacity = "1.0";
        sendToUnity("submission_failed:" + error.message);
      });
    }

    function cancelSubmit() {
      sendToUnity("close_submit_confirm");
    }

    /*
     * Unity (ARHudController) pushes live context data
     * Format: { type: "confirm_context", progress: 75, status: "In Progress", studentId: "...", ... }
     */
    window.addEventListener("message", function (e) {
      var d = e.data;
      if (d && typeof d === "object" && d.type === "confirm_context") {
        submissionData = d;
        if (d.progress != null) {
          var pEl = document.getElementById("modal-progress-val");
          if (pEl) pEl.textContent = Math.round(d.progress) + "%";
        }
        if (d.status != null) {
          var sEl = document.getElementById("modal-status-val");
          if (sEl) sEl.textContent = d.status;
        }
      }
    });

    // Tell Unity we're loaded and ready for context data
    sendToUnity("confirm_ready");
  </script>
</body>
</html>
