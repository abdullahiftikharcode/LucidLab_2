<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LucidLab - Student Signup</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        :root {
            --bg: #0f2223;
            --bg-elev: #132a2b;
            --card: rgba(18, 35, 36, 0.82);
            --line: rgba(0, 242, 255, 0.22);
            --line-soft: rgba(148, 163, 184, 0.28);
            --text: #e6f3f4;
            --muted: #95aab0;
            --primary: #00f2ff;
            --danger: #f87171;
            --ok: #34d399;
            --warn: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: Inter, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 640px at -10% 0%, rgba(0, 242, 255, 0.16), transparent 55%),
                radial-gradient(800px 480px at 100% 100%, rgba(8, 76, 94, 0.46), transparent 65%),
                var(--bg);
        }

        .page {
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(460px, 100%);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .back {
            border: 1px solid var(--line);
            background: rgba(0, 242, 255, 0.08);
            color: var(--primary);
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            cursor: pointer;
        }

        .back:hover {
            background: rgba(0, 242, 255, 0.14);
        }

        .head-spacer {
            width: 42px;
            height: 42px;
        }

        .brand {
            text-align: center;
        }

        .logo {
            width: 86px;
            height: 86px;
            border-radius: 20px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.12);
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand h1 {
            margin: 0;
            font-size: clamp(28px, 6vw, 36px);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .brand h1 span {
            color: var(--primary);
        }

        .brand p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        .card {
            border-radius: 18px;
            border: 1px solid var(--line);
            background: var(--card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 24px 60px rgba(3, 9, 14, 0.5);
            padding: 22px;
        }

        .card h2 {
            margin: 0;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
        }

        .sub {
            margin: 4px 0 0;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .alert {
            margin-top: 14px;
            min-height: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--danger);
        }

        .field {
            margin-top: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .material-symbols-outlined.input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #7f9398;
            font-size: 20px;
            pointer-events: none;
        }

        input {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--line-soft);
            background: rgba(3, 12, 15, 0.45);
            color: var(--text);
            padding: 0 42px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input::placeholder {
            color: #6f858b;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.18);
        }

        .toggle {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #7f9398;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .toggle:hover {
            background: rgba(0, 242, 255, 0.08);
            color: var(--primary);
        }

        .meter {
            margin-top: 8px;
        }
        /* Skeleton Shimmer */
        .skeleton {
          background: rgba(255, 255, 255, 0.05);
          border-radius: 6px;
          position: relative;
          overflow: hidden;
        }
        .skeleton::after {
          content: "";
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
          animation: shimmer 2s infinite;
          transform: translateX(-100%);
        }
        @keyframes shimmer {
          100% { transform: translateX(100%); }
        }
        .meter-track {
            height: 7px;
            border-radius: 999px;
            background: #223539;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0;
            transition: width 0.25s, background-color 0.25s;
            background: transparent;
        }

        .hint {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            min-height: 16px;
        }

        .submit {
            margin-top: 16px;
            width: 100%;
            height: 48px;
            border: 0;
            border-radius: 12px;
            background: var(--primary);
            color: #072024;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.02em;
            cursor: pointer;
            box-shadow: 0 0 22px rgba(0, 242, 255, 0.38);
            transition: opacity 0.2s, transform 0.08s;
        }

        .submit:active {
            transform: scale(0.985);
        }

        .submit[disabled] {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            margin: 16px 0;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            color: #7f9398;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.11em;
            font-weight: 700;
        }

        .divider::before,
        .divider::after {
            content: "";
            display: block;
            height: 1px;
            background: var(--line-soft);
        }

        .google {
            width: 100%;
            height: 48px;
            border-radius: 12px;
            border: 1px solid var(--line-soft);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .google:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .google svg {
            width: 18px;
            height: 18px;
        }

        .swap {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .swap a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            margin-left: 6px;
        }

        .swap a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="shell">
            <div class="head">
                <button id="backBtn" class="back" type="button" aria-label="Back to login">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div class="head-spacer"></div>
            </div>

            <div class="brand">
                <div class="logo">
                    <img src="images/app_logo.png" alt="LucidLab Logo" />
                </div>
                <h1>Lucid<span>Lab</span></h1>
                <p>Create your student account</p>
            </div>

            <div class="card">
                <h2>Get Started</h2>
                <p class="sub">Join your classroom and run AR experiments</p>

                <div id="signupError" class="alert" role="alert" aria-live="polite"></div>

                <form id="signupForm" novalidate>
                    <div class="field">
                        <label for="name">Full Name</label>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">person</span>
                            <input id="name" name="name" type="text" placeholder="Your full name" autocomplete="name" required />
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Student Email</label>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">mail</span>
                            <input id="email" name="email" type="email" placeholder="name@school.edu" autocomplete="email" required />
                        </div>
                    </div>

                    <div class="field">
                        <label for="password">Password</label>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">lock</span>
                            <input id="password" name="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6" />
                            <button type="button" class="toggle" data-target="password" aria-label="Toggle password visibility">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                        <div class="meter" aria-hidden="true">
                            <div class="meter-track">
                                <div id="strengthBar" class="meter-fill"></div>
                            </div>
                        </div>
                        <p id="strengthText" class="hint"></p>
                    </div>

                    <div class="field">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="input-wrap">
                            <span class="material-symbols-outlined input-icon">lock_reset</span>
                            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat your password" autocomplete="new-password" required minlength="6" />
                            <button type="button" class="toggle" data-target="confirmPassword" aria-label="Toggle confirm password visibility">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                        <p id="matchText" class="hint"></p>
                    </div>

                    <button id="signupBtn" class="submit" type="submit">CREATE ACCOUNT</button>
                </form>

                <div class="divider">or</div>

                <button id="googleBtn" class="google" type="button">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                    </svg>
                    Continue with Google
                </button>
            </div>

            <p class="swap">
                Already have an account?
                <a id="goLogin" href="#">Log in</a>
            </p>
        </section>
    </main>

    <script>
        function sendToUnity(msg) {
            if (window.Unity && window.Unity.call) {
                window.Unity.call(msg);
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.unityControl) {
                window.webkit.messageHandlers.unityControl.postMessage(msg);
            } else {
                console.log("Sent to Unity:", msg);
                window.location = "unity:" + msg;
            }
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function scorePassword(pw) {
            var score = 0;
            if (!pw) return 0;
            if (pw.length >= 6) score++;
            if (pw.length >= 10) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/\d/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            return Math.min(4, score);
        }

        function getStrengthMeta(score) {
            if (score <= 0) return { pct: 0, label: "", color: "transparent" };
            if (score === 1) return { pct: 25, label: "Weak", color: "#ef4444" };
            if (score === 2) return { pct: 50, label: "Fair", color: "#f59e0b" };
            if (score === 3) return { pct: 75, label: "Good", color: "#22c55e" };
            return { pct: 100, label: "Strong", color: "#10b981" };
        }

        document.addEventListener("DOMContentLoaded", function () {
            var form = document.getElementById("signupForm");
            var errorBox = document.getElementById("signupError");
            var nameEl = document.getElementById("name");
            var emailEl = document.getElementById("email");
            var passwordEl = document.getElementById("password");
            var confirmEl = document.getElementById("confirmPassword");
            var strengthBar = document.getElementById("strengthBar");
            var strengthText = document.getElementById("strengthText");
            var matchText = document.getElementById("matchText");
            var signupBtn = document.getElementById("signupBtn");
            var googleBtn = document.getElementById("googleBtn");
            var loginLink = document.getElementById("goLogin");
            var backBtn = document.getElementById("backBtn");

            function setLoading(isLoading) {
                signupBtn.disabled = isLoading;
                googleBtn.disabled = isLoading;
                if (isLoading) {
                    signupBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 18px; vertical-align: middle; margin-right: 8px;">progress_activity</span> CREATING...';
                } else {
                    signupBtn.textContent = "CREATE ACCOUNT";
                }
            }

            function showError(message) {
                errorBox.textContent = message || "";
            }

            function updateStrength() {
                var info = getStrengthMeta(scorePassword(passwordEl.value));
                strengthBar.style.width = info.pct + "%";
                strengthBar.style.backgroundColor = info.color;
                strengthText.textContent = info.label ? "Password strength: " + info.label : "";
            }

            function updateMatch() {
                if (!confirmEl.value) {
                    matchText.textContent = "";
                    return;
                }
                if (confirmEl.value === passwordEl.value) {
                    matchText.textContent = "Passwords match";
                    matchText.style.color = "var(--ok)";
                } else {
                    matchText.textContent = "Passwords do not match";
                    matchText.style.color = "var(--danger)";
                }
            }

            Array.prototype.forEach.call(document.querySelectorAll(".toggle"), function (button) {
                button.addEventListener("click", function () {
                    var targetId = button.getAttribute("data-target");
                    var input = document.getElementById(targetId);
                    var icon = button.querySelector(".material-symbols-outlined");
                    var showing = input.type === "text";
                    input.type = showing ? "password" : "text";
                    icon.textContent = showing ? "visibility" : "visibility_off";
                });
            });

            passwordEl.addEventListener("input", function () {
                updateStrength();
                updateMatch();
            });

            confirmEl.addEventListener("input", updateMatch);

            form.addEventListener("submit", function (event) {
                event.preventDefault();
                showError("");

                var name = nameEl.value.trim();
                var email = emailEl.value.trim();
                var password = passwordEl.value;
                var confirmPassword = confirmEl.value;

                if (!name) {
                    showError("Enter your full name.");
                    return;
                }
                if (!email || !isValidEmail(email)) {
                    showError("Enter a valid student email address.");
                    return;
                }
                if (password.length < 6) {
                    showError("Password must be at least 6 characters.");
                    return;
                }
                if (password !== confirmPassword) {
                    showError("Passwords do not match.");
                    return;
                }

                setLoading(true);
                sendToUnity("register:" + JSON.stringify({
                    name: name,
                    email: email,
                    password: password,
                    role: "student"
                }));
                setTimeout(function () {
                    setLoading(false);
                }, 900);
            });

            googleBtn.addEventListener("click", function (event) {
                event.preventDefault();
                showError("");
                sendToUnity("google_login");
            });

            loginLink.addEventListener("click", function (event) {
                event.preventDefault();
                sendToUnity("login_clicked");
            });

            backBtn.addEventListener("click", function () {
                sendToUnity("back");
            });

            updateStrength();
            updateMatch();
        });
    </script>
    <script>
    // Bridge: route auth through shell via postMessage
    (function () {
        window.sendToUnity = function (msg) {
            if (msg === "login_clicked" || msg === "back") {
                parent.postMessage("navigate:login", "*");
            } else if (msg.indexOf("register:") === 0) {
                var data = JSON.parse(msg.substring(9));
                parent.postMessage({ type: "auth", action: "register", name: data.name, email: data.email, password: data.password }, "*");
            } else if (msg === "google_login") {
                parent.postMessage({ type: "auth", action: "google_login" }, "*");
            } else {
                parent.postMessage("unity:" + msg, "*");
            }
        };

        // Listen for auth results from shell
        window.addEventListener("message", function (event) {
            var data = event.data;
            if (!data || data.type !== "auth_result") return;
            var signupBtn = document.getElementById("signupBtn");
            var googleBtn = document.getElementById("googleBtn");
            var errorBox = document.getElementById("signupError");
            if (signupBtn) { signupBtn.disabled = false; signupBtn.textContent = "CREATE ACCOUNT"; }
            if (googleBtn) googleBtn.disabled = false;
            if (!data.success && errorBox) {
                errorBox.textContent = data.error || "Registration failed.";
            }
        });
    })();
    </script>
</body>
</html>
