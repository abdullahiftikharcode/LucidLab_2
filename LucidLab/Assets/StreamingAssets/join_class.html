<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>LucidLab - Join Class</title>
  <link rel="stylesheet" href="fonts/fonts.css" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--accent, #00f2ff)",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-modal {
            background: rgba(15, 34, 35, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
        }

        .code-input:focus {
            box-shadow: 0 0 15px color-mix(in srgb, var(--accent) 40%, transparent);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <!-- Background Dashboard (Screen 5 context) -->
    <div class="relative min-h-screen flex flex-col blur-sm grayscale-[0.2]">
        <!-- Top Nav -->
        <div
            class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
            <div class="flex size-12 shrink-0 items-center">
                <div class="bg-primary/20 flex items-center justify-center rounded-full size-10 text-primary">
                    <span class="material-symbols-outlined">person</span>
                </div>
            </div>
            <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 ml-2">
                Student Dashboard</h2>
            <div class="flex w-12 items-center justify-end">
                <button id="notif-btn" class="text-slate-900 dark:text-slate-100">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
            </div>
        </div>
        <!-- Main Content -->
        <div class="p-4 flex-1">
            <h2 class="text-slate-900 dark:text-slate-100 text-[22px] font-bold leading-tight tracking-tight pb-3 pt-5">
                Your Labs</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="relative bg-slate-800 rounded-xl overflow-hidden aspect-video group">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <img class="w-full h-full object-cover"
                        data-alt="Chemistry laboratory glass equipment with blue liquid"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrLCRGdZvalta8wWH_MUmSdXdl1h2jj5xN_9A2lzVuFS-I6XaRVzJLkx8u8AWnS8Me8UWa_26DJKTHUqN1cRPeO9qLp4AC7fMh9DWCKsKwbqf0OAncy_4nWQK1WYAvLt9T-ln5-GsNZJyh0JnHh1ljMQlD4mh6E_q5-t9fzFY-gN6xDK_KqL0PgDy-BnoYb2HaZ6XserrVuCfH806cnSStmSsqPb4KEDGLms5I1epxGrLgq5tRENbFJBFX0e2PXiw3GrYrXa8j7UZX" />
                    <p class="absolute bottom-3 left-3 text-white text-sm font-bold">Chemistry 101</p>
                </div>
                <div class="relative bg-slate-800 rounded-xl overflow-hidden aspect-video">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                    <img class="w-full h-full object-cover" data-alt="Abstract quantum physics particle visualization"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwoUU6bImB5WjzP6voAEHqVvmAEAN9ax6SfFFAsftJXdGe9UPGhKuCiySW-NvZQVc_i6Co_pHvavew9o3CzWd0xgGmkaLnOfimTJdMOxyV5y_1pcRlfV-O062ngYlhSF957y5WukODQZ0Ac_ycUyxWylx6meoVZw2lZ0Gkq-A8NkuJHIO18F4CX2NklZVSSkbUpulH-loKkCGZXtajkwRl5hXoBjYa88swDLzyliWgfOVL5KybfIvo_I-WeEEonZC7fhIUT0MsXm-K" />
                    <p class="absolute bottom-3 left-3 text-white text-sm font-bold">Quantum Physics</p>
                </div>
            </div>
        </div>
        <!-- Bottom Nav -->
        <div
            class="flex gap-2 border-t border-primary/10 bg-background-light dark:bg-background-dark/80 px-4 pb-8 pt-2">
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
                <span class="material-symbols-outlined">home</span>
                <p class="text-xs font-medium">Home</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">science</span>
                <p class="text-xs font-medium">Labs</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">account_circle</span>
                <p class="text-xs font-medium">Profile</p>
            </a>
            <a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400" href="#">
                <span class="material-symbols-outlined">settings</span>
                <p class="text-xs font-medium">Settings</p>
            </a>
        </div>
    </div>
    <!-- Modal Overlay -->
    <div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-[2px]">
        <!-- Join Class Modal -->
        <div class="glass-modal w-full max-w-md rounded-xl p-6 shadow-2xl relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
            <!-- Close Button -->
            <button class="absolute top-4 right-4 text-slate-400 hover:text-primary transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
            <!-- Header -->
            <div class="mb-6">
                <div
                    class="w-12 h-12 bg-primary/20 rounded-lg flex items-center justify-center mb-4 border border-primary/30">
                    <span class="material-symbols-outlined text-primary text-3xl">school</span>
                </div>
                <h3 class="text-xl font-bold text-slate-100 tracking-tight">Join a Classroom</h3>
                <p class="text-slate-400 text-sm mt-1">Enter the join code provided by your teacher to access the lab.
                </p>
            </div>
            <!-- Input Section -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-primary uppercase tracking-widest mb-2">6-Digit
                        Access Code</label>
                    <input
                        class="code-input w-full bg-slate-900/50 border border-primary/20 rounded-lg py-4 px-4 text-center text-2xl font-mono tracking-[0.5em] text-primary placeholder-primary/20 focus:outline-none focus:border-primary transition-all uppercase"
                        maxlength="6" placeholder="L-X9R2" type="text" />
                </div>
                <div class="flex flex-col gap-3 pt-2">
                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-[0_0_20px_color-mix(in_srgb,var(--accent)_30%,transparent)] transition-all flex items-center justify-center gap-2">
                        <span>Join Class</span>
                        <span class="material-symbols-outlined text-xl">login</span>
                    </button>
                    <button
                        class="w-full bg-transparent hover:bg-white/5 text-slate-300 font-medium py-3 rounded-lg transition-colors border border-white/10">
                        Cancel
                    </button>
                </div>
            </div>
            <!-- Footer Note -->
            <p class="mt-6 text-center text-xs text-slate-500">
                Need help? <a class="text-primary/60 hover:text-primary underline decoration-primary/30"
                    href="#">Contact instructor</a>
            </p>
        </div>
    </div>
    <script>
        document.getElementById("notif-btn").addEventListener("click", function() {
            parent.postMessage("navigate:notifications", "*");
        });

        const joinBtn = document.querySelector('button.bg-primary');
        const codeInput = document.querySelector('input.code-input');

        joinBtn.addEventListener('click', function() {
            const code = codeInput.value.trim();
            if (!code) return;
            
            joinBtn.disabled = true;
            joinBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 20px;">progress_activity</span> Joining...';
            
            // Send to Unity/Parent
            parent.postMessage({ type: "join_classroom", code: code.toUpperCase() }, "*");
            
            // Re-enable if no response or after timeout (optional, but good for UI resilience)
            setTimeout(() => {
                joinBtn.disabled = false;
                joinBtn.innerHTML = '<span>Join Class</span><span class="material-symbols-outlined text-xl">login</span>';
            }, 5000);
        });
    </script>
</body>

</html>
